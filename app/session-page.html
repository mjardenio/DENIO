<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENIO - Active Session</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body class="app-body">
    <div class="app-container slide-transition" id="sessionWrapper">
        
        <div class="session-top-bar">
            <div class="timer" id="mainStopwatch">00:00:00</div>
            <div class="progress-chip" id="exProgress">1/7</div>
        </div>

        <div class="media-container">
            <div class="media-placeholder">[ Exercise GIF / Visuals ]</div>
            
            <div class="rest-overlay" id="restTimerOverlay">
                <h3>Rest Timer</h3>
                <div class="rest-time" id="restTimeDisplay">00:30</div>
            </div>
        </div>

        <div class="info-container" style="min-height: 85px;">
            
            <div id="exerciseDetailsView" style="display: flex; flex-direction: column; justify-content: center;">
                <h2 class="ex-title" id="exTitle" style="margin: 0 0 5px 0;">Lat Pulldowns</h2>
                <p class="ex-desc" style="margin: 0; font-size: 13px; color: #aaa;">Pull the bar down to your chest, squeezing your shoulder blades together.</p>
            </div>

            <div id="coachJayView" style="display: none; width: 100%;">
                <div class="coach-banner reverse" style="width: 100%; margin: 0;">
                    <img src="../assets/CoachJ.png" class="coach-avatar" alt="Coach Jay">
                    <div class="coach-msg-container">
                        <div class="coach-msg" id="restCoachMsg">"Breathe deep. You'll need that oxygen for the next set!"</div>
                    </div>
                </div>
            </div>

            <div class="sets-scroll" id="setsWrapper" style="margin-top: 20px;">
                </div>
            
        </div>

        <div class="action-container">
            <button class="btn-main" onclick="processNextAction()">NEXT</button>
        </div>
        
    </div>

    <script src="../js/global.js"></script>
    <script type="module" src="../js/app.js"></script>
</body>
</html>
