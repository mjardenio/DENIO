<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENIO - Library</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body class="app-body">
    <div class="app-container pb-60">
        
        <div class="app-header">
            <img src="../assets/FLOGO.png" alt="DENIO Logo" class="app-logo">
            <div class="profile-chip" onclick="window.location.href='profile-view.html'" style="cursor: pointer;">
                <span>User</span>
                <div class="profile-img">U</div>
            </div>
        </div>

        <div class="filter-header" id="filterContainer">
            <button class="filter-pill active" onclick="applyFilter('All')">All</button>
            <button class="filter-pill" onclick="applyFilter('Chest')">Chest</button>
            <button class="filter-pill" onclick="applyFilter('Back')">Back</button>
            <button class="filter-pill" onclick="applyFilter('Arms')">Arms</button>
            <button class="filter-pill" onclick="applyFilter('Legs')">Legs</button>
            <button class="filter-pill" onclick="applyFilter('Shoulders')">Shoulders</button>
            <button class="filter-pill" onclick="applyFilter('Abs')">Abs</button>
        </div>

        <div class="library-list" id="libraryList">
            <div style="text-align: center; color: #888; padding: 20px;">Loading library...</div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="window.location.href='homepage.html'">
                <div class="nav-icon">🏠︎</div>Home
            </button>
            <button class="nav-btn" onclick="window.location.href='summary-page.html'">
                <div class="nav-icon">☰</div>Summary
            </button>
            <button class="nav-btn active" onclick="window.location.href='library-page.html'">
                <div class="nav-icon">🕮</div>Library
            </button>
            <button class="nav-btn" onclick="window.location.href='chat-page.html'">
                <div class="nav-icon">🗫</div>Chat
            </button>
        </div>
        
    </div>

    <script src="../js/global.js"></script>
    <script type="module" src="../js/app.js"></script>
</body>
</html>
