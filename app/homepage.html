<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENIO - Homepage</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body class="app-body">
    <div class="app-container pb-60">
        
        <div class="app-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <div class="coach-banner" style="margin-bottom: 0; flex: 1; margin-right: 15px;">
                <img src="../assets/CoachJ.png" class="coach-avatar" alt="Coach Jay">
                <div class="coach-msg-container">
                    <div class="coach-msg" id="homeCoachMsg">"Loading..."</div>
                </div>
            </div>
            <div class="profile-chip" onclick="window.location.href='profile-view.html'" style="cursor: pointer;">
                <span>User</span>
                <div class="profile-img">U</div>
            </div>
        </div>

        <div class="days-scroll" id="daysContainer">
            </div>

        <div class="workout-info">
            <h2 id="workoutTitle">Loading...</h2>
            <p id="focusSubtitle" style="color: #e63946;">Fetching plan...</p>
        </div>

        <div class="exercises-scroll" id="exerciseList">
            </div>

        <div class="action-container" id="startContainer">
            <button class="btn-main" id="startSessionBtn">START WORKOUT</button>
            <button class="btn-main" id="disabledSessionBtn" style="background-color: #333; color: #888; border: 1px solid #444; cursor: not-allowed; display: none;" disabled>SESSION LOCKED</button>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn active" onclick="window.location.href='homepage.html'">
                <div class="nav-icon">🏠︎</div>Home
            </button>
            <button class="nav-btn" onclick="window.location.href='summary-page.html'">
                <div class="nav-icon">☰</div>Summary
            </button>
            <button class="nav-btn" onclick="window.location.href='library-page.html'">
                <div class="nav-icon">🕮</div>Library
            </button>
            <button class="nav-btn" onclick="window.location.href='chat-page.html'">
                <div class="nav-icon">🗫</div>Chat
            </button>
        </div>
        
    </div>

    <script src="../js/global.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/homepage.js"></script>
</body>
</html>
