<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENIO - Results</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/app.css">
    
</head>
<body class="app-body">
    <div class="app-container p-30 overflow-y-auto">
        
        <h1 class="result-title">Congratulations!</h1>
        <h1 class="result-title">You've completed a workout</h1>
        
        <div class="duration-display">Duration: 00:45:12</div>

        <div class="stats-container">
            <div class="stat-row">
                <span>Total Sets</span> 
                <span class="stat-value">21</span>
            </div>
            <div class="stat-row">
                <span>Estimated Calories</span> 
                <span class="stat-value">320 kcal</span>
            </div>
            <div class="stat-row">
                <span>Max Weight Lifted</span> 
                <span class="stat-value">120 lbs</span>
            </div>
        </div>

        <div class="coach-banner result-coach-banner" style="margin-top: 20px; margin-bottom: 25px; width: 100%;">
            <img src="../assets/CoachJ.png" class="coach-avatar" alt="Coach Jay">
            <div class="coach-msg-container">
                <div class="coach-msg" id="resultCoachMsg">"Awesome work today! Your consistency is paying off."</div>
            </div>
        </div>

        <div class="survey-title">How does it feel?</div>
        <div class="survey-list">
            <div class="survey-btn" onclick="handleSurvey(this, 'easy')">I can do more</div>
            <div class="survey-btn" onclick="handleSurvey(this, 'perfect')">It feels enough</div>
            <div class="survey-btn" onclick="handleSurvey(this, 'hard')">It's too much</div>
        </div>

        <div class="action-container mt-auto">
            <button class="btn-main" id="finishBtn" disabled onclick="finishSession()">FINISH WORKOUT</button>
        </div>
        
    </div>

    <script src="../js/global.js"></script>
    <script type="module" src="../js/app.js"></script>
</body>
</html>
