<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DENIO - Login</title>
  
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-wrapper">
      
      <img src="../assets/FLOGO.png" alt="DENIO Logo" class="logo-img">
      <p class="logo-subtitle">AI-ASSISTED VIRTUAL TRAINER</p>
      
      <hr class="divider">
      
      <input type="email" id="emailInput" placeholder="Email">
      <input type="password" id="passwordInput" placeholder="Password">
      
      <div class="action-row" style="justify-content: flex-end;">
        <a href="admin-login.html" class="action-link">Admin login</a>
      </div>
      
      <button id="loginBtn" class="btn-primary">LOGIN</button>
      
      <div class="auth-footer">
        <p class="auth-footer-text">Don't have an account?</p>
        <button class="link-btn" onclick="window.location.href='signup.html'">Sign Up</button>
      </div>
      
    </div>
  </div>

  <script src="../js/global.js"></script>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
