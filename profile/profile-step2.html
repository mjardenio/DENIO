<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DENIO - Profile Setup Step 2</title>
  
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body class="auth-body">
  <div class="auth-container justify-start">
    
    <div class="setup-header">
      <button class="circle-btn" onclick="window.location.href='profile-step1.html'">&#8592;</button>
      <button class="circle-btn" onclick="validateProfile2()">&#8594;</button>
    </div>
    
    <div class="setup-title">
      <h2>HI!</h2>
      <h3>SETUP YOUR PROFILE</h3>
    </div>
    
    <div class="setup-section mt-20">
      <label>Workout frequency a week</label>
      <div class="segmented-grid" id="freqGroup">
        <button class="segment-btn" onclick="selectFreq(this)">1</button>
        <button class="segment-btn" onclick="selectFreq(this)">2</button>
        <button class="segment-btn" onclick="selectFreq(this)">3</button>
        <button class="segment-btn" onclick="selectFreq(this)">4</button>
        <button class="segment-btn" onclick="selectFreq(this)">5</button>
        <button class="segment-btn" onclick="selectFreq(this)">6</button>
        <button class="segment-btn" onclick="selectFreq(this)">7</button>
      </div>
    </div>
    
    <div class="setup-section mt-35 full-width">
      <label>Equipment Available</label>
      <div class="eq-grid" id="equipGroup">
        <button class="sel-btn" onclick="selectEquip(this)">FULL GYM</button>
        <button class="sel-btn" onclick="selectEquip(this)">BARBELLS</button>
        <button class="sel-btn" onclick="selectEquip(this)">DUMBBELLS</button>
        <button class="sel-btn" onclick="selectEquip(this)">KETTLE BELLS</button>
        <button class="sel-btn" onclick="selectEquip(this)">MACHINES</button>
        <button class="sel-btn" onclick="selectEquip(this)">NONE</button>
      </div>
    </div>
    
  </div>

  <script src="../js/global.js"></script>
  <script type="module" src="../js/profile.js"></script>
</body>
</html>
