<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DENIO - Admin Login</title>
  
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-wrapper">
      
      <img src="../assets/FLOGO.png" alt="DENIO Logo" class="logo-img">
      <p class="admin-subtitle">ADMINISTRATOR PORTAL</p>
      
      <hr class="divider">
      
      <input type="email" id="adminEmail" placeholder="Admin Email">
      <input type="password" id="adminPassword" placeholder="Password">
      
      <div class="action-row">
        <a href="login.html" class="action-link">Back to User Login</a>
      </div>
      
      <button class="btn-primary" id="adminLoginBtn">Login</button>
      
    </div>
  </div>

  <script src="../js/global.js"></script>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
